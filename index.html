:root{

.my-loading .hand{font-size:30px;color:var(--accent);}

/* top bar */
.my-top{position:sticky;top:0;z-index:5;display:flex;align-items:center;justify-content:space-between;
  gap:16px;padding:16px clamp(16px,5vw,40px);
  background:linear-gradient(180deg,rgba(243,234,217,.96),rgba(243,234,217,.78));
  backdrop-filter:blur(8px);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:10px;}
.mark{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;
  background:var(--ink);color:var(--paper);font-family:'Fraunces',serif;font-weight:600;font-size:15px;letter-spacing:-1px;
  box-shadow:0 2px 0 var(--accent);}
.mark-y{color:var(--accent-2);}
.brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:19px;letter-spacing:-.01em;}
.toggle{display:flex;gap:4px;background:var(--card-2);border:1px solid var(--line);border-radius:999px;padding:4px;}
.toggle button{border:0;background:transparent;cursor:pointer;font:inherit;font-size:13.5px;font-weight:600;color:var(--ink-2);
  padding:7px 16px;border-radius:999px;transition:.18s;}
.toggle button.on{background:var(--ink);color:var(--paper);box-shadow:0 2px 6px var(--shadow);}
.top-right{display:flex;align-items:center;gap:14px;}
.save{font-size:12px;font-weight:600;min-width:46px;text-align:right;transition:opacity .3s;}
.save-idle{opacity:0;} .save-saving{color:var(--ink-2);opacity:1;} .save-saved{color:var(--green);opacity:1;}
.datenav{display:flex;align-items:center;gap:4px;}
.datenav button{display:grid;place-items:center;width:34px;height:34px;border-radius:9px;border:1px solid var(--line);
  background:var(--card);color:var(--ink);cursor:pointer;transition:.15s;}
.datenav button:hover{background:var(--card-2);border-color:var(--accent-2);}
.today-btn{width:auto!important;padding:0 12px;font:inherit;font-size:12.5px;font-weight:600;}

/* main */
.my-main{position:relative;z-index:1;max-width:760px;margin:0 auto;padding:28px clamp(16px,5vw,40px) 0;}
.year{max-width:920px;}

/* day head */
.day-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;}
.kicker{font-size:19px;color:var(--accent);line-height:1;}
.date-title{font-family:'Fraunces',serif;font-weight:500;font-size:clamp(28px,5vw,40px);letter-spacing:-.02em;margin:4px 0 4px;line-height:1.02;}
.microline{font-size:13.5px;color:var(--ink-2);}
.today-pill{background:var(--accent);color:#fff;font-size:21px;line-height:1;padding:7px 16px 9px;border-radius:999px;transform:rotate(-3deg);box-shadow:0 3px 8px var(--shadow);}

/* cards */
.card{background:var(--card);border:1px solid var(--line-2);border-radius:16px;padding:20px 22px;margin-bottom:18px;
  box-shadow:0 1px 0 #fff inset,0 10px 24px -18px var(--shadow);}
.card-eyebrow{display:flex;align-items:center;gap:9px;font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-2);margin-bottom:14px;}
.badge{display:inline-grid;place-items:center;min-width:20px;height:20px;padding:0 6px;border-radius:6px;background:var(--card-2);border:1px solid var(--line);font-size:11px;color:var(--ink-2);}
.badge.accent{background:var(--accent);color:#fff;border-color:var(--accent);}
.hint{font-size:12.5px;color:var(--ink-2);margin:12px 2px 0;font-style:italic;}
.hint.top{margin:0 2px 14px;}

/* focus lines */
.focus{display:grid;grid-template-columns:auto auto 1fr auto;align-items:center;gap:12px;padding:10px 0;}
.focus + .focus{border-top:1px dashed var(--line);}
.focus-mit{gap:14px;padding:6px 0 4px;}
.rank{font-family:'Fraunces',serif;font-size:14px;color:var(--ink-2);width:10px;}
.focus-mit .rank{display:none;}
.box{flex:none;width:26px;height:26px;border-radius:8px;border:2px solid var(--line);background:var(--card-2);cursor:pointer;
  display:grid;place-items:center;color:#fff;transition:.15s;}
.box.sm{width:22px;height:22px;border-radius:7px;}
.focus-mit .box{width:30px;height:30px;border-radius:9px;border-color:var(--accent-2);}
.box.checked{background:var(--accent);border-color:var(--accent);}
.box:hover{border-color:var(--accent-2);}
.focus-input,.task-input{width:100%;border:0;background:transparent;font:inherit;color:var(--ink);padding:4px 0;outline:none;}
.focus-mit .focus-input{font-family:'Fraunces',serif;font-size:19px;font-weight:500;}
.focus.done .focus-input,.tasks li.done .task-input{color:var(--ink-2);text-decoration:line-through;text-decoration-color:var(--accent-2);}
.focus-input::placeholder,.task-input::placeholder{color:#b6a890;}

/* pomodoro */
.pomo-row{display:flex;align-items:center;gap:8px;flex:none;}
.pomo-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-2);}
.pomo-dots{display:flex;gap:5px;min-width:18px;}
.pomo{width:14px;height:14px;border-radius:50%;border:1.6px solid var(--accent-2);background:transparent;cursor:pointer;padding:0;transition:.15s;}
.pomo.filled{background:var(--accent);border-color:var(--accent);}
.pomo:hover{transform:scale(1.15);}
.pomo-empty{color:#c4b69e;font-size:13px;}
.pomo-step{display:flex;gap:3px;}
.pomo-step button{width:20px;height:20px;border-radius:6px;border:1px solid var(--line);background:var(--card-2);cursor:pointer;display:grid;place-items:center;color:var(--ink-2);}
.pomo-step button:hover{border-color:var(--accent-2);color:var(--accent);}

/* tasks */
.tasks{list-style:none;margin:0;padding:0;}
.tasks li{display:flex;align-items:center;gap:11px;padding:7px 0;border-bottom:1px solid var(--line-2);}
.task-del{margin-left:auto;border:0;background:transparent;color:#c4b69e;cursor:pointer;display:grid;place-items:center;padding:4px;border-radius:6px;}
.task-del:hover{color:var(--accent);background:var(--accent-soft);}
.task-add{display:flex;align-items:center;gap:10px;padding:12px 0 2px;}
.task-add input{flex:1;border:0;background:transparent;font:inherit;outline:none;color:var(--ink);}
.task-add input::placeholder{color:#b6a890;}
.muted{color:#c4b69e;}
.add-btn{border:0;background:var(--ink);color:var(--paper);font:inherit;font-size:12.5px;font-weight:600;padding:6px 14px;border-radius:8px;cursor:pointer;}

/* reflection */
.reflect{background:var(--card-2);}
.lined{width:100%;border:0;border-radius:10px;font:inherit;font-size:15px;line-height:28px;color:var(--ink);
  padding:6px 12px;resize:vertical;outline:none;
  background:
    linear-gradient(var(--card),var(--card)) padding-box,
    repeating-linear-gradient(var(--card) 0 27px, var(--line) 27px 28px);
  border:1px solid var(--line);}
.lined::placeholder{color:#b6a890;}
.mini-prompt{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--ink-2);margin:16px 0 6px;font-weight:700;}
.improve{width:100%;border:0;border-bottom:2px solid var(--accent-2);background:transparent;font:inherit;font-size:15px;padding:6px 2px;outline:none;color:var(--ink);}
.improve::placeholder{color:#b6a890;}

/* oh-wow moments */
.wows{background:linear-gradient(180deg,#fbf3e6,#f7ecd8);border-color:var(--accent-soft);}
.wow-list{list-style:none;margin:0;padding:0;}
.wow-list li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-2);}
.wow-spark{color:var(--accent);flex:none;}
.wow-text{flex:1;border:0;background:transparent;font:inherit;font-size:15px;color:var(--ink);outline:none;padding:2px 0;}
.wow-time{font-family:'Caveat',cursive;font-size:16px;color:var(--accent-2);flex:none;}
.wow-del{flex:none;border:0;background:transparent;color:#c4b69e;cursor:pointer;display:grid;place-items:center;padding:4px;border-radius:6px;opacity:0;transition:.15s;}
.wow-list li:hover .wow-del{opacity:1;}
.wow-del:hover{color:var(--accent);background:var(--accent-soft);}
.wow-add{display:flex;align-items:center;gap:10px;padding:12px 0 2px;}
.wow-add input{flex:1;border:0;background:transparent;font:inherit;outline:none;color:var(--ink);}
.wow-add input::placeholder{color:#bfa98c;font-style:italic;}

/* moments / thumbnails */
.moments{background:var(--card-2);}
.thumb-grid{display:flex;flex-wrap:wrap;gap:12px;}
.thumb{position:relative;width:92px;margin:0;display:flex;flex-direction:column;gap:5px;}
.thumb-img{padding:0;border:0;background:none;cursor:pointer;border-radius:10px;overflow:hidden;line-height:0;
  box-shadow:0 3px 10px -4px var(--shadow);transform:rotate(-1.5deg);transition:.18s;}
.thumb:nth-child(even) .thumb-img{transform:rotate(1.5deg);}
.thumb-img:hover{transform:rotate(0) scale(1.04);}
.thumb-img img{width:92px;height:92px;object-fit:cover;display:block;border:3px solid #fff;border-radius:10px;}
.thumb-del{position:absolute;top:-6px;right:-6px;width:22px;height:22px;border-radius:50%;border:0;background:var(--ink);color:#fff;
  cursor:pointer;display:grid;place-items:center;box-shadow:0 2px 6px var(--shadow);opacity:0;transition:.15s;}
.thumb:hover .thumb-del{opacity:1;}
.thumb-cap{width:92px;border:0;background:transparent;font:inherit;font-size:11px;color:var(--ink-2);text-align:center;outline:none;padding:0;}
.thumb-cap::placeholder{color:#c4b69e;}
.thumb-add{width:92px;height:92px;border-radius:10px;border:2px dashed var(--line);background:var(--card);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;color:var(--ink-2);transition:.15s;}
.thumb-add span{font-size:11px;}
.thumb-add:hover{border-color:var(--accent-2);color:var(--accent);}
.thumb-add:disabled{opacity:.6;cursor:default;}

/* lightbox */
.lightbox{position:fixed;inset:0;z-index:50;background:rgba(40,28,18,.72);backdrop-filter:blur(3px);
  display:grid;place-items:center;padding:24px;animation:fade .2s ease both;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.lightbox-inner{position:relative;background:#fff;padding:12px 12px 10px;border-radius:14px;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);
  transform:rotate(-1deg);max-width:min(90vw,460px);}
.lightbox-inner img{display:block;max-width:100%;max-height:70vh;border-radius:6px;}
.lightbox-cap{text-align:center;font-size:22px;color:var(--accent);margin:8px 0 2px;}
.lightbox-x{position:absolute;top:-14px;right:-14px;width:34px;height:34px;border-radius:50%;border:0;background:var(--ink);color:#fff;
  cursor:pointer;display:grid;place-items:center;box-shadow:0 4px 12px rgba(0,0,0,.3);}

/* plan tomorrow */
.plan{background:linear-gradient(180deg,#fbf6ec,#f7eede);border-color:var(--accent-soft);}
.open-tomorrow{margin-top:14px;display:inline-flex;align-items:center;gap:8px;border:1px solid var(--accent);background:transparent;color:var(--accent);
  font:inherit;font-size:13.5px;font-weight:600;padding:9px 16px;border-radius:10px;cursor:pointer;transition:.15s;}
.open-tomorrow:hover{background:var(--accent);color:#fff;}

/* year view */
.year-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:18px;margin-bottom:24px;}
.year-stats{display:flex;gap:10px;}
.stat{background:var(--card);border:1px solid var(--line-2);border-radius:12px;padding:10px 16px;min-width:92px;box-shadow:0 10px 24px -18px var(--shadow);}
.stat-top{display:flex;align-items:center;gap:7px;color:var(--accent);}
.stat-n{font-family:'Fraunces',serif;font-size:24px;font-weight:600;color:var(--ink);}
.stat-l{font-size:11px;color:var(--ink-2);}
.grid{display:flex;flex-direction:column;gap:8px;}
.week-row{display:flex;align-items:center;gap:14px;}
.week-tag{display:flex;flex-direction:column;align-items:center;justify-content:center;width:42px;flex:none;color:var(--ink-2);}
.week-tag .hand{font-size:15px;line-height:.8;color:var(--accent-2);}
.week-tag{font-family:'Fraunces',serif;font-size:18px;}
.week-tag.cur{color:var(--accent);}
.week-days{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;flex:1;}
.cell{position:relative;aspect-ratio:1.35;border:1px solid var(--line-2);background:var(--card);border-radius:10px;cursor:pointer;
  display:flex;align-items:flex-start;justify-content:flex-end;padding:6px 8px;transition:.15s;}
.cell:hover{transform:translateY(-2px);border-color:var(--accent-2);box-shadow:0 8px 18px -12px var(--shadow);}
.cell-d{font-size:11px;color:var(--ink-2);font-weight:600;}
.cell-dot{position:absolute;left:8px;bottom:8px;width:9px;height:9px;border-radius:50%;border:1.6px solid var(--line);}
.cell.setm .cell-dot{border-color:var(--accent);}
.cell.filled{background:linear-gradient(180deg,#fff4ec,#f7e3d6);border-color:var(--accent-2);}
.cell.filled .cell-dot{background:var(--accent);border-color:var(--accent);}
.cell.is-cur{outline:2px solid var(--ink);outline-offset:1px;}
.cell.is-today{box-shadow:inset 0 0 0 2px var(--accent-2);}
.cell.is-today .cell-d{color:var(--accent);}
.legend{display:flex;align-items:center;gap:20px;flex-wrap:wrap;margin-top:22px;font-size:12.5px;color:var(--ink-2);}
.legend span{display:flex;align-items:center;gap:7px;}
.legend i.lg{width:11px;height:11px;border-radius:50%;border:1.6px solid var(--line);display:inline-block;}
.legend i.lg.setm{border-color:var(--accent);}
.legend i.lg.filled{background:var(--accent);border-color:var(--accent);}
.reset{margin-left:auto;border:1px dashed var(--line);background:transparent;color:var(--ink-2);font:inherit;font-size:12.5px;padding:7px 14px;border-radius:9px;cursor:pointer;}
.reset:hover{border-color:var(--accent);color:var(--accent);}

/* warning banner */
.warn{background:linear-gradient(180deg,#fbe9d9,#f6ddc5);border:1px solid var(--accent-2);border-radius:14px;
  padding:16px 18px;margin-bottom:20px;display:flex;flex-direction:column;gap:6px;box-shadow:0 10px 24px -18px var(--shadow);}
.warn strong{font-family:'Fraunces',serif;font-size:16px;color:var(--accent);}
.warn span{font-size:13px;color:var(--ink);line-height:1.5;}
.warn-actions{display:flex;gap:10px;margin-top:8px;}
.warn-actions button{border:1px solid var(--accent);background:transparent;color:var(--accent);font:inherit;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:9px;cursor:pointer;transition:.15s;}
.warn-actions button:first-child{background:var(--accent);color:#fff;}
.warn-actions button:hover{filter:brightness(1.05);}

/* info banner (saving unconfirmed) */
.info{background:var(--card);border:1px solid var(--line);border-left:4px solid var(--accent-2);border-radius:12px;
  padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--ink);line-height:1.5;}
.info strong{color:var(--accent);}

/* backup card */
.backup{margin-top:22px;background:var(--card);border:1px solid var(--line-2);border-radius:14px;padding:18px 20px;
  box-shadow:0 10px 24px -18px var(--shadow);}
.backup-head{display:flex;align-items:center;gap:9px;font-size:13.5px;font-weight:600;color:var(--ink);}
.dotstatus{width:9px;height:9px;border-radius:50%;flex:none;}
.dotstatus.ok{background:var(--green);box-shadow:0 0 0 3px rgba(125,138,79,.18);}
.dotstatus.bad{background:var(--accent);box-shadow:0 0 0 3px rgba(188,74,40,.16);}
.dotstatus.wait{background:var(--accent-2);box-shadow:0 0 0 3px rgba(217,138,95,.2);}
.backup-note{font-size:12.5px;color:var(--ink-2);margin:9px 0 14px;line-height:1.5;}
.backup-note code{background:var(--card-2);border:1px solid var(--line);border-radius:5px;padding:1px 5px;font-size:12px;}
.backup-actions{display:flex;gap:10px;flex-wrap:wrap;}
.backup-actions button{font:inherit;font-size:13px;font-weight:600;padding:9px 16px;border-radius:10px;cursor:pointer;transition:.15s;}
.bk-export{border:0;background:var(--ink);color:var(--paper);}
.bk-import{border:1px solid var(--line);background:transparent;color:var(--ink);}
.backup-actions button:hover{transform:translateY(-1px);}

/* footer */
.my-foot{position:relative;z-index:1;text-align:center;margin-top:34px;font-size:12px;color:var(--ink-2);display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.my-foot .dot{color:var(--accent-2);}

/* reveal animation */
.reveal{animation:rise .55s cubic-bezier(.2,.7,.2,1) both;}
.d1{animation-delay:.05s}.d2{animation-delay:.1s}.d3{animation-delay:.15s}.d4{animation-delay:.2s}.d5{animation-delay:.25s}.d6{animation-delay:.3s}.d7{animation-delay:.35s}.d8{animation-delay:.4s}.d9{animation-delay:.45s}.d10{animation-delay:.5s}.d11{animation-delay:.55s}.d12{animation-delay:.6s}.d13{animation-delay:.65s}
@keyframes rise{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
@media (max-width:560px){
  .toggle button{padding:7px 11px;font-size:12.5px;}
  .focus{grid-template-columns:auto 1fr;gap:10px;}
  .focus .rank{display:none;}
  .pomo-row{grid-column:1/-1;justify-content:flex-start;padding-left:38px;}
  .focus-mit .box{grid-row:1;}
  .week-tag{width:32px;font-size:15px;}
  .week-days{gap:5px;}
  .cell{border-radius:8px;padding:4px 5px;}
  .cell-dot{width:7px;height:7px;left:5px;bottom:5px;}
}


/* ---- mobile / standalone additions (iPhone 17 Pro Max optimized) ---- */
html,body{margin:0;padding:0;}
input,textarea,button{font-family:inherit;-webkit-tap-highlight-color:transparent;}
input,textarea{font-size:16px;} /* prevents iOS zoom-on-focus */

/* logged text in single spacing (no wide ruled lines) */
.lined{line-height:1.4;background:var(--card);padding:10px 12px;}

/* typed responses in Helvetica Neue Light, all one size */
.focus-input,.task-input,.wow-text,.lined,.improve,.thumb-cap,.fam-input,.fr-input,.place-add input,.proj-input,.proj-add input,.idea-text,.idea-add input,
.task-add input,.wow-add input,
.focus-mit .focus-input{
  font-family:"Helvetica Neue","HelveticaNeue",Helvetica,Arial,sans-serif;
  font-weight:300;font-size:16px;-webkit-font-smoothing:antialiased;
}
/* auto-growing textareas: wrap and expand to fit (font/size kept per field) */
textarea.grow{display:block;box-sizing:border-box;width:100%;min-width:0;min-height:1.6em;resize:none;overflow:hidden;
  line-height:1.4;white-space:pre-wrap;overflow-wrap:break-word;word-break:break-word;vertical-align:top;}
.thumb-cap.grow{width:92px;}
.improve{width:100%;border:0;border-bottom:1.5px solid var(--accent-2);background:transparent;outline:none;color:var(--ink);padding:5px 0;}
.improve::placeholder{color:#b6a890;}

/* ideas */
.idea-add{display:flex;align-items:center;gap:10px;padding:0 0 6px;}
.idea-add input{flex:1;border:0;background:transparent;outline:none;color:var(--ink);}
.idea-add input::placeholder{color:#b6a890;}
.idea-list{list-style:none;margin:0;padding:0;}
.idea-list li{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid var(--line-2);}
.idea-list li:last-child{border-bottom:0;}
.idea-spark{flex:none;color:var(--accent);}
.idea-text{flex:1;border:0;background:transparent;outline:none;color:var(--ink);}
.idea-date{flex:none;font-family:'Caveat',cursive;font-size:15px;color:var(--accent-2);}
.idea-del{flex:none;border:0;background:transparent;color:#c4b69e;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px;}
.idea-del:hover{color:var(--accent);background:var(--accent-soft);}
.ideas-all{margin-top:12px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);font:inherit;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;}
.ver{opacity:.75;font-variant-numeric:tabular-nums;}

/* house to habitat */
.house .next-project{display:flex;align-items:center;gap:10px;background:#0a0a0c;color:#f3ead9;border-radius:12px;padding:12px 14px;margin-bottom:14px;}
.np-label{flex:none;font-size:10px;font-weight:700;letter-spacing:.12em;background:var(--accent);color:#fff;padding:3px 8px;border-radius:6px;}
.np-name{font-family:'Fraunces',serif;font-size:17px;line-height:1.2;}
.house .proj-list{list-style:none;margin:0;padding:0;}
.house li{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);}
.house li:last-child{border-bottom:0;}
.proj-input{flex:1;border:0;background:transparent;outline:none;color:var(--ink);}
.house li.done .proj-input{color:var(--ink-2);text-decoration:line-through;text-decoration-color:var(--accent-2);}
.proj-up,.proj-del{flex:none;border:0;background:transparent;color:var(--ink-2);cursor:pointer;font-size:15px;padding:3px 7px;border-radius:6px;}
.proj-up:hover,.proj-del:hover{color:var(--accent);background:var(--accent-soft);}
.proj-add{display:flex;align-items:center;gap:10px;padding:12px 0 2px;}
.proj-add input{flex:1;border:0;background:transparent;outline:none;color:var(--ink);}
.proj-add input::placeholder{color:#b6a890;}

/* places */
.places .place-list,.places .place-all-list{list-style:none;margin:0;padding:0;}
.places li{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line-2);}
.places li:last-child{border-bottom:0;}
.place-pin{flex:none;text-decoration:none;color:var(--accent);font-size:16px;}
.place-name{flex:1;color:var(--ink);text-decoration:none;font-size:15px;}
.place-name:active{text-decoration:underline;}
.place-del{flex:none;border:0;background:transparent;color:#c4b69e;cursor:pointer;font-size:16px;padding:2px 6px;border-radius:6px;}
.place-del:hover{color:var(--accent);background:var(--accent-soft);}
.place-date{flex:none;font-family:'Caveat',cursive;font-size:15px;color:var(--accent-2);}
.place-add{display:flex;align-items:center;gap:10px;padding:12px 0 2px;}
.place-add input{flex:1;border:0;background:transparent;outline:none;color:var(--ink);}
.place-add input::placeholder{color:#b6a890;}
.places-all{margin-top:12px;border:1px solid var(--line);background:var(--card);color:var(--ink-2);font:inherit;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;}
.places-all.open{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.place-all-list{margin-top:10px;}

/* place search dropdown */
.place-results{margin-top:8px;border:1px solid var(--line);border-radius:12px;overflow:hidden;background:var(--card);}
.pr-loading,.pr-empty{padding:12px 14px;font-size:13px;color:var(--ink-2);}
.pr-item{display:flex;flex-direction:column;gap:2px;width:100%;text-align:left;border:0;border-bottom:1px solid var(--line-2);background:transparent;padding:10px 14px;cursor:pointer;}
.pr-item:last-child{border-bottom:0;}
.pr-item:active{background:var(--card-2);}
.pr-name{font-size:14.5px;font-weight:600;color:var(--ink);}
.pr-addr{font-size:12px;color:var(--ink-2);}
.pr-attr{padding:7px 14px;font-size:10.5px;color:var(--ink-2);text-align:right;font-style:italic;background:var(--card-2);}

/* version history */
.ver{cursor:pointer;text-decoration:underline;text-decoration-style:dotted;text-underline-offset:2px;}
.ver-sheet{position:relative;background:var(--card);border-radius:16px;padding:22px 20px 14px;max-width:min(92vw,460px);max-height:74vh;overflow:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);}
.ver-title{font-family:'Fraunces',serif;font-weight:600;margin:0 0 2px;font-size:20px;color:var(--ink);}
.ver-cur{margin:0 0 14px;font-size:12.5px;color:var(--accent);font-weight:600;}
.ver-list{list-style:none;margin:0;padding:0;}
.ver-list li{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line-2);}
.ver-list li:last-child{border-bottom:0;}
.ver-num{flex:none;font-family:'Fraunces',serif;font-weight:600;color:var(--accent);width:60px;font-variant-numeric:tabular-nums;}
.ver-desc{font-size:13px;color:var(--ink);line-height:1.4;}

/* lighten the load */
.friction .fr-label{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);margin-bottom:5px;}
.friction .fr-input + .fr-label{margin-top:14px;}
.fr-input{width:100%;border:0;border-bottom:1.5px solid var(--line);background:transparent;outline:none;color:var(--ink);padding:5px 0;}
.fr-input.lift{border-bottom-color:var(--accent-2);}
.fr-input::placeholder{color:#b6a890;}

/* per-day section customization */
.cust-toggle{display:inline-flex;align-items:center;gap:6px;margin:0 0 16px;border:1px solid var(--line);
  background:var(--card);color:var(--ink-2);font:inherit;font-size:12.5px;font-weight:600;padding:8px 14px;border-radius:999px;cursor:pointer;}
.cust-toggle.open{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.cust-toggle:active{transform:scale(.97);}
.top-actions{display:flex;align-items:center;gap:9px;flex:none;}
.cust-icon{position:relative;flex:none;width:38px;height:38px;border-radius:50%;border:1px solid var(--line);background:var(--card-2);color:var(--ink);font-size:17px;line-height:1;display:grid;place-items:center;cursor:pointer;}
.cust-icon.open{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.cust-icon:active{transform:scale(.95);}
.cust-badge{position:absolute;top:-3px;right:-3px;min-width:16px;height:16px;padding:0 4px;border-radius:999px;background:var(--accent);color:#fff;font-size:10px;font-weight:700;display:grid;place-items:center;line-height:1;}
.cust-badge:empty{display:none;}
.persp{display:flex;align-items:flex-start;gap:11px;margin:0 0 18px;padding:13px 16px;border-radius:14px;
  background:linear-gradient(180deg,var(--card) 0%,var(--card-2) 100%);border:1px solid var(--line);box-shadow:0 1px 0 #fff inset,0 8px 20px -16px var(--shadow);}
.persp-mark{flex:none;color:var(--accent-2);font-size:15px;line-height:1.6;margin-top:1px;}
.persp-input{flex:1;border:0;background:transparent;outline:none;font-family:'Fraunces',serif;font-style:italic;font-weight:500;font-size:16px;line-height:1.5;color:var(--ink);}
.persp-input::placeholder{color:#b6a890;font-style:italic;}
.tier{padding:1px 0;}
.tier + .tier{border-top:1px solid var(--line-2);margin-top:13px;padding-top:13px;}
.tier-label{display:flex;align-items:center;gap:8px;font-size:11px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-2);margin-bottom:5px;}
.custom{background:var(--card-2);}
.sec-list{list-style:none;margin:0 0 14px;padding:0;}
.sec-list li{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line-2);}
.sec-list li:last-child{border-bottom:0;}
.sec-list span.sec-name{font-size:15px;flex:1;}
.sec-move{flex:none;display:flex;gap:4px;}
.sec-move button{width:30px;height:30px;border-radius:8px;border:1px solid var(--line);background:var(--card);color:var(--ink);font-size:15px;line-height:1;cursor:pointer;display:grid;place-items:center;}
.sec-move button:disabled{opacity:.3;}
.sec-move button:active:not(:disabled){background:var(--card-2);}

/* minimized empty box */
.mini{display:flex !important;align-items:center;justify-content:space-between;gap:10px;width:100%;text-align:left;
  padding:14px 18px;cursor:pointer;border:1px solid var(--line);background:var(--card);
  box-shadow:0 1px 0 #fff inset,0 6px 16px -14px var(--shadow);}
.mini-label{font-size:12px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--ink-2);}
.mini-plus{font-size:18px;color:var(--ink-2);line-height:1;}
.mini:active{background:var(--card-2);}
.mini-empty{background:var(--card);border-color:var(--line-2);}
.mini-empty .mini-label{color:#b3a48d;}
.mini-empty .mini-plus{color:#c2b39a;}
.mini:not(.mini-empty) .mini-plus{color:var(--accent);font-size:11px;}

/* card header tools (history + collapse) */
.card-eyebrow{display:flex;align-items:center;gap:9px;}
.card-tools{margin-left:auto;display:flex;align-items:center;gap:4px;}
.card-tools button{border:0;background:transparent;color:var(--ink-2);cursor:pointer;display:grid;place-items:center;width:28px;height:28px;border-radius:7px;}
.card-tools button:active{background:var(--card-2);}
.ct-min{font-size:15px;line-height:1;}

/* punt forward */
.punt-btn{flex:none;border:0;background:transparent;color:var(--ink-2);cursor:pointer;font-size:16px;line-height:1;padding:2px 7px;border-radius:6px;}
.punt-btn:hover,.punt-btn:active{color:var(--accent);background:var(--accent-soft);}
.focus .punt-btn{align-self:center;}
.punt-bar{grid-column:1/-1;display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin-top:8px;padding:8px 10px;background:var(--card-2);border:1px solid var(--line);border-radius:10px;}
.punt-q{font-size:12px;color:var(--ink-2);font-weight:600;}
.punt-opt{border:1px solid var(--accent);background:transparent;color:var(--accent);font:inherit;font-size:12.5px;font-weight:600;padding:6px 12px;border-radius:8px;cursor:pointer;}
.punt-opt:active{background:var(--accent);color:#fff;}
.punt-x{margin-left:auto;border:0;background:transparent;color:var(--ink-2);font-size:16px;cursor:pointer;}

/* history sheet */
.hist-sheet{position:relative;background:var(--card);border-radius:16px;padding:20px 18px 14px;max-width:min(94vw,520px);max-height:80vh;overflow:auto;box-shadow:0 30px 80px -20px rgba(0,0,0,.5);}
.hist-sheet .lightbox-x,.ver-sheet .lightbox-x{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;border:0;background:var(--ink);color:#fff;font-size:20px;line-height:1;display:grid;place-items:center;box-shadow:0 3px 10px rgba(0,0,0,.35);z-index:3;cursor:pointer;}
.hist-loading{padding:30px 10px;text-align:center;color:var(--ink-2);}
.hist-head{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:2px;padding-right:46px;}
.card:not(.mini){border-color:var(--line);}
.hist-title{font-family:'Fraunces',serif;font-weight:600;font-size:19px;margin:0;color:var(--ink);}
.hist-sort{flex:none;border:1px solid var(--line);background:var(--card-2);color:var(--ink);font:inherit;font-size:12px;font-weight:600;padding:6px 11px;border-radius:999px;cursor:pointer;}
.hist-count{font-size:12px;color:var(--ink-2);margin:0 0 12px;}
.hist-list{list-style:none;margin:0;padding:0;}
.hist-row{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid var(--line-2);align-items:flex-start;}
.hist-row:last-child{border-bottom:0;}
.hist-date{flex:none;width:78px;font-family:'Caveat',cursive;font-size:16px;color:var(--accent-2);line-height:1.3;}
.hist-body{flex:1;font-size:14.5px;color:var(--ink);line-height:1.45;font-family:"Helvetica Neue",Helvetica,Arial,sans-serif;font-weight:300;word-break:break-word;}
.hist-row.done .hist-body{color:var(--ink-2);text-decoration:line-through;text-decoration-color:var(--accent-2);}
.hist-thumb{width:64px;height:64px;object-fit:cover;border-radius:8px;border:2px solid #fff;display:block;}
.hist-cap{display:block;font-size:12px;color:var(--ink-2);margin-top:4px;}
.hist-link{color:var(--accent);text-decoration:none;}
.custom-actions{display:flex;flex-wrap:wrap;gap:8px;}
.custom-actions button{font:inherit;font-size:12.5px;font-weight:600;padding:8px 13px;border-radius:9px;cursor:pointer;border:1px solid var(--line);background:var(--card);color:var(--ink);}
.custom-actions .cust-default{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.custom-actions button:active{transform:scale(.97);}

/* family intentions */
.fam-row{padding:9px 0;border-bottom:1px solid var(--line-2);}
.fam-row:last-child{border-bottom:0;}
.fam-name{display:block;font-size:12px;font-weight:700;letter-spacing:.04em;text-transform:uppercase;color:var(--ink-2);margin-bottom:3px;}
.fam-rel{font-weight:400;font-style:italic;text-transform:none;color:var(--accent-2);}
.fam-input{width:100%;border:0;background:transparent;outline:none;color:var(--ink);padding:2px 0;}
.fam-input::placeholder{color:#b6a890;}

/* movement: daily check toggles */
.move-toggles{display:flex;gap:10px;}
.move-btn{flex:1;display:flex;align-items:center;justify-content:center;gap:8px;min-height:54px;
  border:1.5px solid var(--line);background:var(--card);color:var(--ink);border-radius:13px;cursor:pointer;
  font-size:15px;font-weight:600;transition:.14s;}
.move-btn:active{transform:scale(.97);}
.move-l{text-transform:uppercase;letter-spacing:.07em;font-size:13px;font-weight:700;}
.move-ic{display:grid;place-items:center;width:22px;height:22px;border-radius:50%;border:1.5px solid var(--line);
  font-size:13px;font-weight:700;color:#fff;}
.move-btn.cali.on{background:var(--green);border-color:var(--green);color:#fff;}
.move-btn.run.on{background:var(--accent);border-color:var(--accent);color:#fff;}
.move-btn.on .move-ic{background:rgba(255,255,255,.25);border-color:rgba(255,255,255,.6);}

/* movement summary in Mini Year */
.movesum{margin-top:22px;}
.movesum-head{font-size:13px;font-weight:700;letter-spacing:.04em;color:var(--ink);margin-bottom:12px;}
.move-tiles{display:flex;gap:12px;margin-bottom:16px;}
.mtile{flex:1;border:1px solid var(--line-2);border-radius:13px;padding:14px 16px;background:var(--card);
  box-shadow:0 10px 24px -18px var(--shadow);border-top:3px solid var(--line);}
.mtile.cali{border-top-color:var(--green);}
.mtile.run{border-top-color:var(--accent);}
.mtile-top{display:flex;align-items:baseline;gap:5px;}
.mtile-n{font-family:'Fraunces',serif;font-size:30px;font-weight:600;color:var(--ink);line-height:1;}
.mtile-u{font-size:12px;color:var(--ink-2);}
.mtile-l{font-size:12px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-top:3px;}
.mtile-s{font-size:12px;color:var(--ink-2);margin-top:3px;}
.movechart{display:flex;align-items:flex-end;gap:4px;height:96px;padding:8px 4px 0;
  background:var(--card);border:1px solid var(--line-2);border-radius:13px;}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;height:100%;}
.mbars{flex:1;display:flex;align-items:flex-end;justify-content:center;gap:2px;width:100%;}
.mbar{width:42%;min-height:2px;border-radius:3px 3px 0 0;align-self:flex-end;transition:height .3s;}
.mbar.cali{background:var(--green);}
.mbar.run{background:var(--accent);}
.mcol-l{font-size:9px;color:var(--ink-2);}
.mcol.cur .mcol-l{color:var(--accent);font-weight:700;}
.movelegend{display:flex;gap:16px;align-items:center;margin-top:10px;font-size:12px;color:var(--ink-2);flex-wrap:wrap;}
.movelegend i.ml{display:inline-block;width:10px;height:10px;border-radius:3px;vertical-align:-1px;margin-right:5px;}
.movelegend i.ml.cali{background:var(--green);}
.movelegend i.ml.run{background:var(--accent);}
.mw-axis{margin-left:auto;font-style:italic;}

/* combined active streak banner */
.active-streak{display:flex;align-items:center;gap:12px;background:#0a0a0c;color:#f3ead9;border-radius:14px;
  padding:14px 18px;margin-bottom:16px;}
.as-flame{font-size:26px;line-height:1;}
.as-n{font-family:'Fraunces',serif;font-size:38px;font-weight:600;line-height:1;color:#fff;}
.as-l{font-size:14px;font-weight:600;line-height:1.25;}
.as-sub{font-size:11px;font-weight:400;color:var(--accent-2);}

/* mini year navigation */
.yh-nav{display:flex;align-items:center;gap:10px;}
.yh-title{flex:1;min-width:0;}
.my-arrow{flex:none;width:42px;height:42px;border-radius:11px;border:1px solid var(--line);background:var(--card);
  color:var(--ink);font-size:22px;line-height:1;cursor:pointer;display:grid;place-items:center;box-shadow:0 2px 8px -4px var(--shadow);}
.my-arrow:active{transform:scale(.93);background:var(--card-2);}
.week-tag{cursor:pointer;}
.week-tag:active{opacity:.6;}

/* header: two rows, fixed and always visible */
.my-top{flex-direction:column;align-items:stretch;gap:12px;
  padding:calc(12px + env(safe-area-inset-top)) calc(16px + env(safe-area-inset-right)) 12px calc(16px + env(safe-area-inset-left));}
.top-row1{display:flex;align-items:center;justify-content:space-between;gap:12px;}
.brand{display:flex;align-items:center;gap:10px;min-width:0;}
.mark{display:inline-flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:9px;
  background:var(--ink);color:var(--paper);font-family:'Fraunces',serif;font-weight:600;font-size:16px;line-height:1;letter-spacing:-.5px;
  box-shadow:0 2px 0 var(--accent);}
.mark-y{color:var(--accent-2);}
.brand-name{font-family:'Fraunces',serif;font-weight:600;font-size:18px;white-space:nowrap;}
.toggle{flex:none;}
.toggle button{padding:8px 14px;font-size:13px;}

/* date strip — big, obvious, thumb-friendly */
.datestrip{display:flex;align-items:center;gap:10px;position:relative;}
.nav-arrow{flex:none;width:46px;height:46px;border-radius:12px;border:1px solid var(--line);background:var(--card);
  color:var(--ink);font-size:24px;line-height:1;cursor:pointer;display:grid;place-items:center;
  box-shadow:0 2px 8px -4px var(--shadow);transition:.12s;}
.nav-arrow:active{transform:scale(.94);background:var(--card-2);}
.datestrip-mid{flex:1;min-width:0;height:46px;border:1px solid var(--line);border-radius:12px;background:var(--card);
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;padding:0 8px;}
.ds-date{font-family:'Fraunces',serif;font-size:16px;font-weight:600;color:var(--ink);line-height:1.05;}
.ds-sub{font-size:11px;color:var(--ink-2);}
.save{position:absolute;top:-9px;right:8px;font-size:11px;font-weight:700;padding:1px 8px;border-radius:999px;
  background:var(--card-2);border:1px solid var(--line);transition:opacity .3s;}
.save-idle{opacity:0;} .save-saving{opacity:1;color:var(--ink-2);} .save-saved{opacity:1;color:var(--green);border-color:var(--green);}

/* cadence chips */
.cadence{display:flex;flex-wrap:wrap;gap:6px;margin-top:12px;}
.chip{font-size:11px;font-weight:700;letter-spacing:.03em;color:var(--ink-2);background:var(--card);
  border:1px solid var(--line-2);border-radius:999px;padding:5px 11px;white-space:nowrap;}
.chip b{color:var(--accent);font-weight:700;}
.chip.lead{background:#0a0a0c;color:#f0ece2;border-color:#0a0a0c;}
.chip.lead b{color:var(--accent-2);}
.weekrange{font-size:13.5px;color:var(--ink-2);margin-top:6px;}
.weekrange b{color:var(--ink);font-weight:600;}

/* week grid: show W/C date under MW label */
.week-tag{width:54px;font-family:'Hanken Grotesk',sans-serif;font-size:12px;line-height:1.15;gap:1px;}
.week-tag .wt-mw{font-family:'Fraunces',serif;font-size:13px;font-weight:600;display:flex;align-items:baseline;gap:2px;color:var(--ink);}
.week-tag.cur .wt-mw{color:var(--accent);}
.week-tag .wt-mw .hand{font-size:10px;color:var(--accent-2);}
.week-tag .wt-gw{font-size:10px;font-weight:700;color:var(--accent-2);letter-spacing:.02em;}
.week-tag.cur .wt-gw{color:var(--accent);}
.week-tag .wc{font-size:9.5px;color:var(--ink-2);font-family:'Hanken Grotesk',sans-serif;margin-top:1px;}
.cell.weekend:not(.filled):not(.setm){background:#ece0c8;border-color:var(--line);}

.my-foot{margin-bottom:calc(20px + env(safe-area-inset-bottom));padding-left:16px;padding-right:16px;}
.my-main{padding-left:calc(16px + env(safe-area-inset-left));padding-right:calc(16px + env(safe-area-inset-right));}
.a2hs{background:linear-gradient(180deg,#fbe9d9,#f6ddc5);border:1px solid var(--accent-2);border-radius:14px;
  padding:14px 16px;margin-bottom:18px;display:flex;flex-direction:column;gap:6px;position:relative;}
.a2hs strong{font-family:'Fraunces',serif;color:var(--accent);font-size:15px;}
.a2hs span{font-size:13px;color:var(--ink);line-height:1.5;}
.a2hs .x{position:absolute;top:8px;right:10px;border:0;background:transparent;color:var(--ink-2);font-size:18px;cursor:pointer;line-height:1;}
.share-ico{display:inline-block;width:15px;height:15px;vertical-align:-2px;}

<body>
<div class="my-root">
  <div class="grain" aria-hidden></div>
  <header class="my-top">
    <div class="top-row1">
      <div class="brand"><span class="mark">A<span class="mark-y">O</span></span></div>
      <div class="top-actions">
        <div class="toggle">
          <button id="tab-today" class="on">Today</button>
          <button id="tab-year">Mini Year</button>
        </div>
        <button id="cust-btn" class="cust-icon" aria-label="Customize sections">⚙<span class="cust-badge" id="cust-badge"></span></button>
      </div>
    </div>
    <div class="datestrip" id="datestrip">
      <button id="prev" class="nav-arrow" aria-label="Previous day">&#8249;</button>
      <button id="todaybtn" class="datestrip-mid">
        <span class="ds-date" id="ds-date">—</span>
        <span class="ds-sub" id="ds-sub">tap for today</span>
      </button>
      <button id="next" class="nav-arrow" aria-label="Next day">&#8250;</button>
      <span id="save" class="save save-idle"></span>
    </div>
  </header>
  <main class="my-main" id="main"></main>
  <footer class="my-foot">
    <span>AO <span id="ver" class="ver"></span></span><span class="dot">·</span>
    <span id="footcadence">cadence</span><span class="dot">·</span>
    <span id="footstatus">on this device</span>
  </footer>
</div>
<div id="overlay"></div>
<input id="importer" type="file" accept="application/json,.json" hidden />
<input id="picker" type="file" accept="image/*" multiple hidden />

<script>
"use strict";
/* ============ Micro Year — standalone Home Screen app ============ *
 * Stores everything on-device (IndexedDB, falls back to localStorage).

/* ---------- storage: IndexedDB KV with fallbacks ---------- */
const DBN="microyear-db", STN="kv";
let _db=null, _mode="idb", _mem={};
function openDB(){
  return new Promise((res)=>{
    try{
      const r=indexedDB.open(DBN,1);
      r.onupgradeneeded=()=>{ try{ r.result.createObjectStore(STN); }catch(e){} };
      r.onsuccess=()=>res(r.result);
      r.onerror=()=>res(null);
    }catch(e){ res(null); }
  });
}
async function tx(mode,fn){
  if(!_db) _db=await openDB();
  if(!_db) throw new Error("no idb");
  return new Promise((res,rej)=>{
    const t=_db.transaction(STN,mode); const os=t.objectStore(STN); let out;
    out=fn(os); t.oncomplete=()=>res(out&&out.result!==undefined?out.result:out); t.onerror=()=>rej(t.error);
  });
}
const store={
  async get(k){
    try{ if(_mode==="idb"){ const r=await tx("readonly",os=>os.get(k)); return r==null?null:r; } }catch(e){ _mode=fallback(); }
    if(_mode==="ls"){ try{ const v=localStorage.getItem(k); return v==null?null:v; }catch(e){ _mode="mem"; } }
    return k in _mem?_mem[k]:null;
  },
  async set(k,v){
    try{ if(_mode==="idb"){ await tx("readwrite",os=>os.put(v,k)); return; } }catch(e){ _mode=fallback(); }
    if(_mode==="ls"){ try{ localStorage.setItem(k,v); return; }catch(e){ _mode="mem"; } }
    _mem[k]=v;
  },
  async keys(prefix){
    try{ if(_mode==="idb"){ const r=await tx("readonly",os=>os.getAllKeys()); return (r||[]).filter(k=>String(k).startsWith(prefix)); } }catch(e){ _mode=fallback(); }
    if(_mode==="ls"){ try{ return Object.keys(localStorage).filter(k=>k.startsWith(prefix)); }catch(e){ _mode="mem"; } }
    return Object.keys(_mem).filter(k=>k.startsWith(prefix));
  }
};
function fallback(){ try{ localStorage.setItem("planner:__t","1"); localStorage.removeItem("planner:__t"); return "ls"; }catch(e){ return "mem"; } }

const parseKey=s=>{const[y,m,d]=s.split("-").map(Number);return new Date(y,m-1,d);};

/* ---------- company cadence ----------
 * Anchored to a known week: W/C 2025-12-28 (Sunday) = fiscal week 1 of FY2026.
 * Verified against the cadence sheet for W/C 2026-05-31:
 *   WK23 · GWTH WK 231 · MTH 5 · GWTH MTH 53 · 2026-Q2 · MY2 · MW9
 * Weeks run Sunday (W/C) to Saturday (W/E). Mini Year = fiscal quarter (13 wks; Q1 = 14).
 */
const FISCAL_ANCHOR="2025-12-28"; // Sunday, FW1 FY2026
function cadence(k){
  const d=parseKey(k), dow=d.getDay();              // 0 = Sunday
  const wc=addDays(k,-dow), we=addDays(wc,6);
  const weeksFromAnchor=Math.round((parseKey(wc)-parseKey(FISCAL_ANCHOR))/(7*MS));
  const gwk=209+weeksFromAnchor;                     // continuous growth week (231 today)
  let fy=2026, w=weeksFromAnchor;
  while(w<0){ w+=53; fy--; } while(w>=53){ w-=53; fy++; }
  const wk=w+1;                                       // fiscal week of year (1..53)
  const ends=[14,27,40,53], starts=[1,15,28,41], inMY=[14,13,13,13];
  let my=4; for(let i=0;i<4;i++){ if(wk<=ends[i]){ my=i+1; break; } }
  const mw=wk-starts[my-1]+1;
  const mCum=(my===1)?[4,9,14]:[4,9,13];             // reporting-month week pattern
  const mInQ=(mw<=mCum[0])?1:(mw<=mCum[1])?2:3;
  const mth=(my-1)*3+mInQ;                            // reporting month 1..12
  const gmth=(fy-2026)*12+48+mth;                    // continuous growth month (53 today)
  const qtr=`${fy}-Q${my}`;
  const myStart=addDays(wc,-(mw-1)*7);               // W/C of MW1 of this mini year
  return {wc,we,wk,gwk,mth,gmth,qtr,my,mw,fy,weeksInMY:inMY[my-1],myStart};
}

const blankFocus=()=>({text:"",complete:false,est:0,pomo:0});
const FAMILY=[{k:"kristin",n:"Kristin",r:"wife"},{k:"henry",n:"Henry James"},{k:"emily",n:"Emily Jane"},{k:"penelope",n:"Penelope Renee"}];
const SECTIONS=[{k:"tasks",n:"Actions"},{k:"friction",n:"Re-framing"},{k:"move",n:"Movement"},{k:"family",n:"Family Intentions"},{k:"house",n:"House to Habitat"},{k:"mem",n:"Memories + Moments"},{k:"places",n:"Places"},{k:"disc",n:"Discoveries + Delights"},{k:"ideas",n:"Ideas"},{k:"reflect",n:"Evening Reflection"},{k:"plan",n:"Plan Tomorrow"}];
const emptyDay=()=>({mit:blankFocus(),sec:[blankFocus(),blankFocus()],tasks:[],reflection:"",improve:"",photos:[],wows:[],train:{cali:false,run:false},family:{},friction:{heavy:"",lift:""},layout:null});
function hydrate(raw){
  const d=emptyDay(); if(!raw) return d;
  try{
    const o=typeof raw==="string"?JSON.parse(raw):raw;
    d.mit={...d.mit,...(o.mit||{})};
    d.sec=[0,1].map(i=>({...blankFocus(),...((o.sec&&o.sec[i])||{})}));
    d.tasks=Array.isArray(o.tasks)?o.tasks.map(t=>({id:t.id||uid(),text:t.text||"",complete:!!t.complete})):[];
    d.reflection=o.reflection||""; d.improve=o.improve||"";
    d.photos=Array.isArray(o.photos)?o.photos.map(p=>({id:p.id||uid(),data:p.data||"",caption:p.caption||""})):[];
    d.wows=Array.isArray(o.wows)?o.wows.map(w=>({id:w.id||uid(),text:w.text||"",time:w.time||""})):[];
    d.train={cali:!!(o.train&&o.train.cali),run:!!(o.train&&o.train.run)};
    d.family=(o.family&&typeof o.family==="object")?{...o.family}:{};
    d.friction={heavy:(o.friction&&o.friction.heavy)||"",lift:(o.friction&&o.friction.lift)||""};
    d.layout=(o.layout&&typeof o.layout==="object")?{...o.layout}:null;
  }catch(e){}
  return d;
}
const dayStatus=d=>({m:!!(d.mit&&d.mit.text.trim()),c:!!(d.mit&&d.mit.complete),cali:!!(d.train&&d.train.cali),run:!!(d.train&&d.train.run)});
function streakOf(act){ let s=0,k=todayKey(); if(!(S.index[k]&&S.index[k][act])) k=addDays(k,-1); while(S.index[k]&&S.index[k][act]){ s++; k=addDays(k,-1); } return s; }
function streakActive(){ const has=k=>!!(S.index[k]&&(S.index[k].cali||S.index[k].run)); let s=0,k=todayKey(); if(!has(k)) k=addDays(k,-1); while(has(k)){ s++; k=addDays(k,-1); } return s; }

/* ---------- image -> tiny thumbnail ---------- */
function fileToThumb(file,max=256,quality=0.62){
  return new Promise((resolve,reject)=>{
    const reader=new FileReader();
    reader.onerror=()=>reject(); 
    reader.onload=()=>{
      const img=new Image();
      img.onerror=()=>reject();
      img.onload=()=>{
        let w=img.width,h=img.height;
        if(w>h&&w>max){h=Math.round(h*max/w);w=max;}
        else if(h>=w&&h>max){w=Math.round(w*max/h);h=max;}
        const c=document.createElement("canvas");c.width=w;c.height=h;
        c.getContext("2d").drawImage(img,0,0,w,h);
        resolve(c.toDataURL("image/jpeg",quality));
      };
      img.src=reader.result;
    };
    reader.readAsDataURL(file);
  });
}

  const ord=await store.get("planner:order");
  const pv=await store.get("planner:perspective"); if(pv!=null) S.perspective=pv;
  let stored=null; if(ord){ try{ stored=JSON.parse(ord); }catch(e){} }

function isEmpty(k){
  const day=S.day;
  switch(k){
    case "tasks": return !day.mit.text.trim() && !day.sec[0].text.trim() && !day.sec[1].text.trim() && day.tasks.length===0;
    case "friction": return !day.friction.heavy.trim() && !day.friction.lift.trim();
    case "move": return !day.train.cali && !day.train.run;
    case "family": return FAMILY.every(m=>!((day.family[m.k]||"").trim()));
    case "house": return S.projects.length===0;
    case "mem": return day.photos.length===0;
    case "places": return S.places.filter(p=>p.date===S.cur).length===0;
    case "disc": return day.wows.length===0;
    case "ideas": return S.ideas.length===0;
    case "reflect": return !day.reflection.trim() && !day.improve.trim();
    case "plan": return !S.tomorrow.mit.text.trim();
    default: return false;
  }
}

/* ---- patch any day's record (used by punt) ---- */
async function patchDay(dateKey,fn){
  let dobj;
  if(dateKey===S.cur) dobj=S.day;
  else if(dateKey===addDays(S.cur,1)) dobj=S.tomorrow;
  else dobj=await loadDay(dateKey);
  fn(dobj);
  await persistDay(dateKey,dobj);
  if(dateKey===S.cur) S.day=dobj;
  if(dateKey===addDays(S.cur,1)) S.tomorrow=dobj;
}
async function puntWMM(targetKey){
  const m=S.day.mit; if(!m.text.trim()) return; const text=m.text, est=m.est;
  await patchDay(targetKey,d=>{ if(!d.mit.text.trim()){ d.mit.text=text; d.mit.est=est; } else d.tasks.push({id:uid(),text,complete:false}); });
  S.day.mit=blankFocus(); saveNow(); renderToday();
}
async function puntFocus(idx,targetKey){
  const it=S.day.sec[idx]; if(!it.text.trim()) return; const text=it.text;
  await patchDay(targetKey,d=>{ d.tasks.push({id:uid(),text,complete:false}); });
  S.day.sec[idx]=blankFocus(); saveNow(); renderToday();
}
async function puntTask(taskId,targetKey){
  const t=S.day.tasks.find(x=>x.id===taskId); if(!t) return; const text=t.text;
  await patchDay(targetKey,d=>{ d.tasks.push({id:uid(),text,complete:false}); });
  S.day.tasks=S.day.tasks.filter(x=>x.id!==taskId); saveNow(); renderToday();
}

/* ---- per-box history ---- */
async function loadAllDays(){
  const keys=await store.keys("planner:day:"); const days=[];
  for(const key of keys){ const v=await store.get(key); if(v){ days.push({date:key.replace("planner:day:",""),day:hydrate(v)}); } }
  return days;
}
function historyEntries(k,days){
  const out=[];
  if(k==="ideas"){ S.ideas.forEach(it=>out.push({date:it.date,text:it.text,ts:it.ts})); return out; }
  if(k==="places"){ S.places.forEach(p=>out.push({date:p.date,text:p.name,url:p.url})); return out; }
  if(k==="house"){ S.projects.forEach(p=>out.push({date:null,text:p.name,done:p.done})); return out; }
  days.forEach(({date,day})=>{
    switch(k){
      case "tasks":
        if(day.mit.text.trim()) out.push({date,text:"① "+day.mit.text,done:day.mit.complete});
        day.sec.forEach(s=>{ if(s.text.trim()) out.push({date,text:"② "+s.text,done:s.complete}); });
        day.tasks.forEach(t=>{ if(t.text.trim()) out.push({date,text:"③ "+t.text,done:t.complete}); });
        break;
      case "plan": if(day.mit.text.trim()) out.push({date,text:day.mit.text,done:day.mit.complete}); break;
      case "friction": if(day.friction.heavy.trim()||day.friction.lift.trim()) out.push({date,text:(day.friction.heavy||"—")+(day.friction.lift?"  →  "+day.friction.lift:"")}); break;
      case "move": { const a=[]; if(day.train.cali)a.push("Calisthenics"); if(day.train.run)a.push("Running"); if(a.length) out.push({date,text:a.join(" + ")}); break; }
      case "family": FAMILY.forEach(m=>{ const v=(day.family[m.k]||"").trim(); if(v) out.push({date,text:m.n+": "+v}); }); break;
      case "mem": day.photos.forEach(p=>out.push({date,photo:p.data,text:p.caption||""})); break;
      case "disc": day.wows.forEach(wv=>out.push({date,text:wv.text,time:wv.time})); break;
      case "reflect": if(day.reflection.trim()) out.push({date,text:day.reflection}); if(day.improve.trim()) out.push({date,text:"Improve: "+day.improve}); break;
    }
  });
  return out;
}
async function openHistory(k){
  const meta=SECTIONS.find(s=>s.k===k)||{n:k};
  const o=document.getElementById("overlay");
  o.innerHTML=`<div class="lightbox"><div class="hist-sheet"><div class="hist-loading">Gathering entries…</div></div></div>`;
  const globalOnly=(k==="ideas"||k==="places"||k==="house");
  const days=globalOnly?[]:await loadAllDays();
  let entries=historyEntries(k,days);
  let sort="desc";
  const render=()=>{
    const sorted=entries.slice().sort((a,b)=>{
      const av=(a.date||"")+(a.ts?("-"+a.ts):""), bv=(b.date||"")+(b.ts?("-"+b.ts):"");
      return sort==="desc"?(bv<av?-1:bv>av?1:0):(av<bv?-1:av>bv?1:0);
    });
    const sheet=el(`<div class="lightbox"><div class="hist-sheet"><button class="lightbox-x">×</button>
      <div class="hist-head"><h3 class="hist-title"></h3><button class="hist-sort"></button></div>
      <div class="hist-count"></div><ul class="hist-list"></ul></div></div>`);
    sheet.querySelector(".hist-title").textContent=meta.n;
    sheet.querySelector(".hist-sort").textContent=sort==="desc"?"Newest first ↓":"Oldest first ↑";
    sheet.querySelector(".hist-sort").onclick=()=>{ sort=(sort==="desc"?"asc":"desc"); o.innerHTML=""; o.appendChild(render()); };
    sheet.querySelector(".hist-count").textContent=sorted.length?`${sorted.length} entr${sorted.length===1?"y":"ies"}`:"Nothing here yet.";
    const ul=sheet.querySelector(".hist-list");
    sorted.forEach(e=>{
      const li=el(`<li class="hist-row ${e.done?"done":""}"><span class="hist-date"></span><span class="hist-body"></span></li>`);
      li.querySelector(".hist-date").textContent=e.date?shortDate(e.date)+(e.time?" · "+e.time:""):"";
      const body=li.querySelector(".hist-body");
      if(e.photo){ const img=el(`<img class="hist-thumb" alt=""/>`); img.src=e.photo; body.appendChild(img); if(e.text){ const cap=el(`<span class="hist-cap"></span>`); cap.textContent=e.text; body.appendChild(cap);} }
      else if(e.url){ const a=el(`<a class="hist-link" target="_blank" rel="noopener"></a>`); a.href=e.url; a.textContent=e.text; body.appendChild(a); }
      else body.textContent=e.text;
      ul.appendChild(li);
    });
    const close=()=>{ o.innerHTML=""; };
    sheet.onclick=close; sheet.querySelector(".hist-sheet").onclick=ev=>ev.stopPropagation(); sheet.querySelector(".lightbox-x").onclick=close;
    return sheet;
  };
  o.innerHTML=""; o.appendChild(render());
}

function flashSave(){

async function persistDay(k,dayObj){
  await store.set("planner:day:"+k,JSON.stringify(dayObj));

  await store.set("planner:index",JSON.stringify(S.index));
  flashSave(); setFootStatus();
}

/* pomodoro dots */
function pomoEl(item,onChange){
  const wrap=el(`<div class="pomo-row"><span class="pomo-label">focus</span><div class="pomo-dots"></div><div class="pomo-step"><button class="minus">−</button><button class="plus">+</button></div></div>`);
  const dots=wrap.querySelector(".pomo-dots");
  const total=Math.max(item.est,item.pomo);
  if(!total) dots.innerHTML=`<span class="pomo-empty">—</span>`;
  for(let i=0;i<total;i++){
    const b=el(`<button class="pomo ${i<item.pomo?"filled":""}"></button>`);
    b.onclick=()=>{ item.pomo=(i+1===item.pomo)?i:i+1; onChange(); };
    dots.appendChild(b);
  }
  wrap.querySelector(".minus").onclick=()=>{ item.est=Math.max(0,item.est-1,item.pomo); onChange(); };
  wrap.querySelector(".plus").onclick=()=>{ item.est=Math.min(8,item.est+1); onChange(); };
  return wrap;
}
/* focus line (MIT / secondary) */
function focusEl(rank,item,big,onSave,onStruct,puntKey,onPunt){
  const wrap=el(`<div class="focus ${big?"focus-mit":""} ${item.complete?"done":""}">
    <button class="box ${big?"":""} ${item.complete?"checked":""}">${item.complete?"✓":""}</button>
    <span class="rank">${rank||""}</span>
    <textarea class="focus-input grow" rows="1" placeholder="${big?"What matters most today…":"Secondary task"}"></textarea>
  </div>`);
  const input=wrap.querySelector(".focus-input"); input.value=item.text;
  input.addEventListener("input",()=>{ item.text=input.value; onSave(); });
  wrap.querySelector(".box").onclick=()=>{ item.complete=!item.complete; onStruct(); };
  wrap.appendChild(pomoEl(item,onStruct));
  if(puntKey && onPunt){

}
function puntBar(onPunt){
  const bar=el(`<div class="punt-bar"><span class="punt-q">Move to</span><button class="punt-opt" data-d="1">Tomorrow</button><button class="punt-opt" data-d="7">Next week</button><button class="punt-x" aria-label="Cancel">×</button></div>`);

  bar.querySelector('[data-d="7"]').onclick=()=>{ S.puntFor=null; onPunt(addDays(S.cur,7)); };

  const addIdea=()=>{ const v=ideaInp.value.trim(); if(!v) return; S.ideas.push({id:uid(),text:v,date:S.cur,ts:Date.now()}); saveIdeas(); renderToday(); setTimeout(()=>{const n=document.querySelector(".idea-add input"); if(n)n.focus();},0); };
  ideaInp.addEventListener("input",()=>{ ideaAdd.style.display=ideaInp.value.trim()?"":"none"; });
  ideaInp.addEventListener("keydown",e=>{ if(e.key==="Enter") addIdea(); });
  ideaAdd.onclick=addIdea;
  const ideaList=cI.querySelector(".idea-list");
  const sorted=[...S.ideas].sort((a,b)=>(b.ts||0)-(a.ts||0));
  const shown=S.ideasOpen?sorted:sorted.slice(0,6);
  shown.forEach(it=>{
    const li=el(`<li><span class="idea-spark">✲</span><textarea class="idea-text grow" rows="1"></textarea><span class="idea-date"></span><button class="idea-del">×</button></li>`);
    const inp=li.querySelector(".idea-text"); inp.value=it.text;
    inp.addEventListener("input",()=>{ it.text=inp.value; scheduleIdeaSave(); });
    li.querySelector(".idea-date").textContent=shortDate(it.date);
    li.querySelector(".idea-del").onclick=()=>{ S.ideas=S.ideas.filter(x=>x.id!==it.id); saveIdeas(); renderToday(); };
    ideaList.appendChild(li);
  });
  const ideasAllBtn=cI.querySelector(".ideas-all");
  if(sorted.length>6){ ideasAllBtn.style.display=""; ideasAllBtn.textContent=S.ideasOpen?"Show fewer":`Show all ideas (${sorted.length})`; ideasAllBtn.onclick=()=>{ S.ideasOpen=!S.ideasOpen; renderToday(); }; }
  cards.ideas=cI;

  // reflection
  const c6=el(`<section class="card reflect reveal d12"><div class="card-eyebrow">☾ Evening Reflection</div>
    <textarea class="lined grow" rows="2" placeholder="Today I…"></textarea>
    <label class="mini-prompt">One thing to improve tomorrow</label>
    <textarea class="improve grow" rows="1" placeholder="Tomorrow I'll…"></textarea></section>`);
  const ta=c6.querySelector(".lined"); ta.value=S.day.reflection;
  ta.addEventListener("input",()=>{ S.day.reflection=ta.value; scheduleSave(); });
  const imp=c6.querySelector(".improve"); imp.value=S.day.improve;
  imp.addEventListener("input",()=>{ S.day.improve=imp.value; scheduleSave(); });
  cards.reflect=c6;

  // plan tomorrow
  const c7=el(`<section class="card plan reveal d13"><div class="card-eyebrow">☀ Plan Tomorrow</div></section>`);
  c7.appendChild(focusEl("",S.tomorrow.mit,true,()=>{clearTimeout(saveTimer);saveTimer=setTimeout(saveTomorrow,550);flashSave();},()=>{saveTomorrow();renderToday();}));
  const openBtn=el(`<button class="open-tomorrow">Open tomorrow — ${prettyDate(addDays(S.cur,1))} ›</button>`);
  openBtn.onclick=()=>goto(addDays(S.cur,1));
  c7.appendChild(openBtn);
  cards.plan=c7;

  // render sections in saved order; minimize empty or collapsed boxes
  S.order.forEach(k=>{
    if(!on(k)) return; const card=cards[k]; if(!card) return;
    const minimized = S.collapsed.has(k) || (isEmpty(k) && !S.expanded.has(k));
    if(minimized) main.appendChild(miniBar(k,card));
    else { addCardControls(k,card); main.appendChild(card); }
  });
}

/* ---------- render: MICRO YEAR ---------- */
function renderYear(){
  const main=document.getElementById("main"); main.innerHTML="";
  const c=cadence(S.cur);
  const myStart=c.myStart, weeksInMY=c.weeksInMY, tKey=todayKey();
  let planned=0,completed=0;
  const totalDays=weeksInMY*7;
  const caliWk=[], runWk=[]; let caliTot=0, runTot=0;

  const wrap=el(`<div class="year reveal">
    <div class="year-head">
      <div class="yh-nav">
        <button class="my-arrow" id="prevMY" aria-label="Previous mini year">&#8249;</button>
        <div class="yh-title"><span class="kicker hand">Mini Year ${c.my} · ${c.qtr}</span>
          <h1 class="date-title">${weeksInMY} Mini Weeks</h1>
          <span class="microline">In view: MW${c.mw} · fiscal week ${c.wk} · growth week ${c.gwk}</span></div>
        <button class="my-arrow" id="nextMY" aria-label="Next mini year">&#8250;</button>
      </div>
      <div class="year-stats"></div>
    </div>
    <div class="grid"></div>
    <div class="legend">
      <span><i class="lg filled"></i> MIT completed</span>
      <span><i class="lg setm"></i> planned</span>
      <span><i class="lg"></i> open</span>
    </div>
    <div class="movesum"></div>
    <div class="backup">
      <div class="backup-head"><span class="dotstatus ${_mode==='mem'?'bad':'ok'}"></span><span class="bh-text"></span></div>
      <p class="backup-note">A backup is a single <code>.json</code> file with all your days, moments and oh-wow notes. Keep it in Files or iCloud; restore it here anytime or on another device.</p>
      <div class="backup-actions"><button class="bk-export">Export backup</button><button class="bk-import">Restore from file</button></div>
    </div>
  </div>`);
  const grid=wrap.querySelector(".grid");
  for(let w=0;w<weeksInMY;w++){
    const wcKey=addDays(myStart,w*7);
    const gwkRow=cadence(wcKey).gwk;
    const row=el(`<div class="week-row"><div class="week-tag ${w+1===c.mw?"cur":""}"><span class="wt-mw"><span class="hand">MW</span>${w+1}</span><span class="wt-gw">GW${gwkRow}</span><span class="wc">${shortDate(wcKey)}</span></div><div class="week-days"></div></div>`);
    row.querySelector(".week-tag").onclick=()=>{ goto(wcKey).then(()=>setView("today")); };
    const wd=row.querySelector(".week-days");
    let cWk=0,rWk=0;
    for(let d=0;d<7;d++){
      const k=addDays(wcKey,d), st=S.index[k];
      if(st&&st.m)planned++; if(st&&st.c)completed++;
      if(st&&st.cali){cWk++;caliTot++;} if(st&&st.run){rWk++;runTot++;}
      const cls=["cell"]; if(d===0||d===6)cls.push("weekend"); if(st&&st.c)cls.push("filled"); else if(st&&st.m)cls.push("setm");
      if(k===tKey)cls.push("is-today"); if(k===S.cur)cls.push("is-cur");
      const cell=el(`<button class="${cls.join(" ")}"><span class="cell-d">${parseKey(k).getDate()}</span><span class="cell-dot"></span></button>`);
      cell.onclick=()=>{ goto(k).then(()=>setView("today")); };
      wd.appendChild(cell);
    }
    caliWk.push(cWk); runWk.push(rWk);
    grid.appendChild(row);
  }
  const stats=wrap.querySelector(".year-stats");
  const mkStat=(sym,n,l)=>el(`<div class="stat"><div class="stat-top">${sym}<span class="stat-n">${n}</span></div><span class="stat-l">${l}</span></div>`);
  stats.appendChild(mkStat("▦",planned,"days planned"));
  stats.appendChild(mkStat("✓",completed,"MITs done"));
  stats.appendChild(mkStat("✦",Math.round(planned/totalDays*100),"% filled"));
  wrap.querySelector(".bh-text").textContent=_mode==="mem"?"Not saving here — export regularly to keep your data.":"Your entries are stored on this device.";
  wrap.querySelector(".bk-export").onclick=exportData;
  wrap.querySelector(".bk-import").onclick=()=>document.getElementById("importer").click();

  // movement summary
  const cStreak=streakOf("cali"), rStreak=streakOf("run"), aStreak=streakActive();
  const ms=wrap.querySelector(".movesum");
  ms.appendChild(el(`<div class="movesum-head">⊙ Movement · Mini Year ${c.my}</div>`));
  ms.appendChild(el(`<div class="active-streak"><span class="as-flame">🔥</span><span class="as-n">${aStreak}</span><span class="as-l">day active streak<br><span class="as-sub">running or calisthenics</span></span></div>`));
  const tiles=el(`<div class="move-tiles">
    <div class="mtile cali"><div class="mtile-top"><span class="mtile-n">${caliTot}</span><span class="mtile-u">days</span></div>
      <div class="mtile-l">Calisthenics</div><div class="mtile-s">${cStreak>0?"🔥 "+cStreak+" day streak":"no active streak"}</div></div>
    <div class="mtile run"><div class="mtile-top"><span class="mtile-n">${runTot}</span><span class="mtile-u">days</span></div>
      <div class="mtile-l">Running</div><div class="mtile-s">${rStreak>0?"🔥 "+rStreak+" day streak":"no active streak"}</div></div>
  </div>`);
  ms.appendChild(tiles);
  const chart=el(`<div class="movechart"></div>`);
  for(let i=0;i<weeksInMY;i++){
    const col=el(`<div class="mcol ${i+1===c.mw?"cur":""}">
      <div class="mbars">
        <div class="mbar cali" style="height:${caliWk[i]/7*100}%" title="Calisthenics ${caliWk[i]}/7"></div>
        <div class="mbar run" style="height:${runWk[i]/7*100}%" title="Running ${runWk[i]}/7"></div>
      </div>
      <div class="mcol-l">${i+1}</div>
    </div>`);
    chart.appendChild(col);
  }
  ms.appendChild(chart);
  ms.appendChild(el(`<div class="movelegend"><span><i class="ml cali"></i> Calisthenics</span><span><i class="ml run"></i> Running</span><span class="mw-axis">by mini week →</span></div>`));

  wrap.querySelector("#prevMY").onclick=()=>goto(addDays(c.myStart,-1));
  wrap.querySelector("#nextMY").onclick=()=>goto(addDays(c.myStart,c.weeksInMY*7));

  main.appendChild(wrap);
}

/* ---------- backup ---------- */
async function exportData(){
  const keys=await store.keys("planner:");
  const data={};
  for(const k of keys){ if(k==="planner:__t")continue; const v=await store.get(k); if(v!=null)data[k]=v; }
  const payload={app:"micro-year",version:1,exportedAt:new Date().toISOString(),data};
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob); const a=document.createElement("a");
  a.href=url; a.download="micro-year-backup-"+todayKey()+".json";
  document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000);
}
async function importData(file){
  if(!file) return;
  try{
    const text=await file.text(); const parsed=JSON.parse(text);
    const data=parsed&&parsed.data?parsed.data:parsed;
    const keys=Object.keys(data).filter(k=>k.startsWith("planner:"));
    if(!keys.length){ alert("That file doesn't look like a Micro Year backup."); return; }
    for(const k of keys) await store.set(k,data[k]);
    await loadConfig(); S.day=await loadDay(S.cur); S.tomorrow=await loadDay(addDays(S.cur,1));
    render(); alert("Restored "+keys.length+" item(s). Your planner is back.");
  }catch(e){ alert("Couldn't read that backup file — make sure it's the .json you exported."); }
}

}

/* ---------- wire chrome + boot ---------- */
document.getElementById("tab-today").onclick=()=>setView("today");
document.getElementById("cust-btn").onclick=()=>{ S.customOpen=!S.customOpen; renderToday(); };
document.getElementById("tab-year").onclick=()=>setView("year");
document.getElementById("prev").onclick=()=>goto(addDays(S.cur,-1));
document.getElementById("next").onclick=()=>goto(addDays(S.cur,1));
document.getElementById("todaybtn").onclick=()=>{ goto(todayKey()).then(()=>setView("today")); };
document.getElementById("importer").addEventListener("change",e=>{ importData(e.target.files[0]); e.target.value=""; });
document.getElementById("picker").addEventListener("change",e=>{ handlePick(e.target.files); e.target.value=""; });
document.getElementById("main").addEventListener("input",e=>{ const t=e.target; if(t&&t.classList&&t.classList.contains("grow")) grow(t); });

(async function boot(){
  await loadConfig();
  S.day=await loadDay(S.cur);
  S.tomorrow=await loadDay(addDays(S.cur,1));
  render();
  const vEl=document.getElementById("ver"); if(vEl){ vEl.textContent="v"+VERSION; vEl.onclick=showVersionHistory; }
})();
</script>
